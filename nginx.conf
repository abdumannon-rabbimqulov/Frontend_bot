server {
    listen 80;
    server_name 138.68.70.230;

    # Frontend Static Files
    location / {
        root /var/www/frontend_bot;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy (Point this to your backend server)
    location /auth/ {
        proxy_pass http://158.220.100.58:8003; # Old backend IP, update if needed
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: SSL configuration (Use Certbot)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/your_domain.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your_domain.uz/privkey.pem;
}

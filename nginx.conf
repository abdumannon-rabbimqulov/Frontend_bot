# HTTPS + HTTP (ACME + redirect). deploy.sh: __DOMAIN__, __LOGISTIKA_BACKEND__

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        root /var/www/frontend_bot;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin SPA (Vite build → Frontend_bot/admin/dist)
    location /admin/ {
        alias /var/www/frontend_bot/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /auth/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/dashboard/ { proxy_pass http://__LOGISTIKA_BACKEND__/admin/dashboard/; include /etc/nginx/proxy_params; }
    location /admin/users      { proxy_pass http://__LOGISTIKA_BACKEND__/admin/users;      include /etc/nginx/proxy_params; }
    location /admin/orders     { proxy_pass http://__LOGISTIKA_BACKEND__/admin/orders;     include /etc/nginx/proxy_params; }
    location /admin/ai/        { proxy_pass http://__LOGISTIKA_BACKEND__/admin/ai/;        include /etc/nginx/proxy_params; }
    location /admin/tariffs/   { proxy_pass http://__LOGISTIKA_BACKEND__/admin/tariffs/;   include /etc/nginx/proxy_params; }

    # Driver live location WS + REST (admin)
    location /admin/drivers/locations/stream {
        proxy_pass http://__LOGISTIKA_BACKEND__/admin/drivers/locations/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    location /admin/drivers/   { proxy_pass http://__LOGISTIKA_BACKEND__/admin/drivers/;   include /etc/nginx/proxy_params; }

    location /drivers/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/drivers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /orders/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://__LOGISTIKA_BACKEND__/health;
    }
}

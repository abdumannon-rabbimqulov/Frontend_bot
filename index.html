<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistika AI - Foydalanuvchi Profili</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --error: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .bg-glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%); z-index: -1; filter: blur(80px); animation: move 15s infinite alternate; }
        @keyframes move { from { transform: translate(-30%, -30%); } to { transform: translate(30%, 30%); } }

        .container { width: 90%; max-width: 420px; background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 2rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        #status-area { text-align: center; margin-bottom: 1.5rem; }
        .badge { padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.05); }

        .profile-card { text-align: center; display: none; }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), #818cf8); border-radius: 25px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: white; box-shadow: 0 10px 20px rgba(56,189,248,0.3); }
        
        h2 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .role-tag { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 1.5rem; display: block; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .info-item { background: rgba(15,23,42,0.5); padding: 1rem; border-radius: 1.25rem; border: 1px solid var(--border); text-align: left; }
        .info-item span { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.25rem; }
        .info-item b { font-size: 0.9rem; color: var(--text); }

        .btn { width: 100%; padding: 1rem; border-radius: 1rem; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 0.75rem; font-family: inherit; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn-outline:hover { color: white; border-color: var(--text-dim); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div id="status-area">
            <span class="badge" id="status-msg">🔄 Yuklanmoqda...</span>
        </div>

        <div id="profile-area" class="profile-card">
            <div class="avatar" id="u-ava">?</div>
            <h2 id="u-name">Foydalanuvchi</h2>
            <span class="role-tag" id="u-role">Noma'lum</span>

            <div class="info-grid">
                <div class="info-item">
                    <span>Telefon</span>
                    <b id="u-phone">-</b>
                </div>
                <div class="info-item">
                    <span>Balans</span>
                    <b id="u-balance" style="color: var(--success);">0 UZS</b>
                </div>
                <div class="info-item" style="grid-column: span 2;">
                    <span>User ID</span>
                    <b id="u-id">#000000</b>
                </div>
            </div>

            <div id="admin-action"></div>
            <button class="btn btn-outline" onclick="logout()">Chiqish</button>
        </div>

        <div id="retry-area" style="display: none;">
            <button class="btn btn-primary" onclick="location.reload()">Qayta urinish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 7915740408;

        function updateStatus(msg, isError = false) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.style.color = isError ? 'var(--error)' : 'inherit';
        }

        async function login(initData) {
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ init_data: initData })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Xatolik yuz berdi');

                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('user_data', JSON.stringify(data));
                showProfile(data);
            } catch (e) {
                updateStatus(e.message, true);
                document.getElementById('retry-area').style.display = 'block';
            }
        }

        function showProfile(user) {
            document.getElementById('status-area').style.display = 'none';
            const area = document.getElementById('profile-area');
            area.style.display = 'block';
            area.style.animation = 'fadeIn 0.5s ease';

            document.getElementById('u-name').textContent = user.full_name || "Ism kiritilmagan";
            document.getElementById('u-ava').textContent = (user.full_name || "?")[0].toUpperCase();
            document.getElementById('u-role').textContent = user.role;
            document.getElementById('u-phone').textContent = user.phone_number || "-";
            document.getElementById('u-id').textContent = "#" + user.user_id;
            document.getElementById('u-balance').textContent = (user.balance || 0) + " UZS";

            if (user.user_id == ADMIN_ID) {
                const adminBtn = document.createElement('button');
                adminBtn.className = 'btn btn-primary';
                adminBtn.innerHTML = '⚙️ Admin Panel';
                adminBtn.onclick = () => window.location.href = 'admin/index.html';
                document.getElementById('admin-action').appendChild(adminBtn);
            }
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#020617');

            const savedData = localStorage.getItem('user_data');
            if (savedData) {
                showProfile(JSON.parse(savedData));
            } else if (tg.initData) {
                login(tg.initData);
            } else {
                updateStatus("Telegram muhiti topilmadi", true);
            }
        };
    </script>
</body>
</html>

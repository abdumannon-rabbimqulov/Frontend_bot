<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logistika</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #cbd5e1;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div>Yo'naltirilmoqda...</div>
    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready?.();
      tg?.expand?.();

      const ACCESS_KEY = 'admin_access_token';
      const REFRESH_KEY = 'admin_refresh_token';
      const USER_KEY = 'admin_user';
      const LOGGED_OUT_KEY = 'logistika_logged_out';

      function normalizeRole(role) {
        return String(role || '').trim().toLowerCase();
      }

      function redirectByRole(user) {
        const role = normalizeRole(user?.role);
        if (role === 'admin') {
          window.location.replace('/admin/');
          return;
        }
        window.location.replace('/drivers/');
      }

      function saveSession(payload, user) {
        localStorage.setItem(ACCESS_KEY, payload.access_token);
        localStorage.setItem(REFRESH_KEY, payload.refresh_token);
        localStorage.setItem(USER_KEY, JSON.stringify(user));
      }

      async function requestJson(url, options = {}) {
        const res = await fetch(url, options);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.message || 'Request failed');
        return data;
      }

      async function loginWithTelegram() {
        if (!tg?.initData) return null;
        return requestJson('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ init_data: tg.initData }),
        });
      }

      async function getMe(token) {
        return requestJson('/api/auth/me', {
          headers: { Authorization: `Bearer ${token}` },
        });
      }

      async function boot() {
        const loggedOut = localStorage.getItem(LOGGED_OUT_KEY) === '1';
        if (loggedOut) {
          window.location.replace('/drivers/');
          return;
        }

        const token = localStorage.getItem(ACCESS_KEY);
        const cachedUser = localStorage.getItem(USER_KEY);
        if (token && cachedUser) {
          try {
            redirectByRole(JSON.parse(cachedUser));
            return;
          } catch {
            localStorage.removeItem(USER_KEY);
          }
        }

        try {
          const payload = await loginWithTelegram();
          if (payload?.access_token) {
            const user = await getMe(payload.access_token);
            saveSession(payload, user);
            redirectByRole(user);
            return;
          }
        } catch (_) {}

        window.location.replace('/drivers/');
      }

      boot();
    </script>
  </body>
</html>

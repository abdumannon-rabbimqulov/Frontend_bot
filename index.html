<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistika AI - Premium WebApp</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(56, 189, 248, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 480px;
            border: 1px solid var(--border-color);
            position: relative;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 1rem;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        h2 {
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        #status {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            min-height: 1.5rem;
        }

        .loading-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-loading { color: var(--warning); background: rgba(251, 191, 36, 0.1); }
        .status-success { color: var(--success); background: rgba(74, 222, 128, 0.1); }
        .status-error { color: var(--error); background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); }

        .response-box {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 1rem;
            padding: 1.25rem;
            margin-top: 1.5rem;
            border: 1px solid var(--border-color);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .response-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        pre {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--primary);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .btn-retry {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
            display: none;
        }

        .btn-retry:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .btn-retry:active {
            transform: scale(0.98);
        }

        /* SVG Icon inside logo */
        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"></path></svg>
            </div>
            <h2>Logistika AI</h2>
            <p style="color: var(--text-dim); font-size: 0.875rem;">Premium Telegram Mini App</p>
        </div>

        <div id="status">
            <span class="status-badge status-loading">
                🔄 Telegram ma'lumotlari kutilmoqda...
            </span>
        </div>

        <div id="response-container" class="response-box">
            <div class="response-header">
                <span>Server Response</span>
                <span id="response-time"></span>
            </div>
            <pre id="response-data"></pre>
        </div>

        <button id="retry-btn" class="btn-retry" onclick="location.reload()">Qayta urinish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const statusEl = document.getElementById('status');
        const responseContainer = document.getElementById('response-container');
        const responseData = document.getElementById('response-data');
        const responseTime = document.getElementById('response-time');
        const retryBtn = document.getElementById('retry-btn');

        function updateStatus(type, message) {
            let className = '';
            let icon = '';
            
            switch(type) {
                case 'loading': 
                    className = 'status-loading'; 
                    icon = '🔄'; 
                    break;
                case 'success': 
                    className = 'status-success'; 
                    icon = '✅'; 
                    break;
                case 'error': 
                    className = 'status-error'; 
                    icon = '❌'; 
                    break;
            }
            
            statusEl.innerHTML = `<span class="status-badge ${className}">${icon} ${message}</span>`;
        }

        async function performLogin(initData) {
            updateStatus('loading', "Login so'rovi yuborilmoqda...");
            
            try {
                const startTime = Date.now();
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ init_data: initData })
                });

                const data = await response.json();
                const duration = Date.now() - startTime;
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }

                updateStatus('success', "Muvaffaqiyatli login!");
                
                responseContainer.style.display = 'block';
                responseTime.textContent = `${duration}ms`;
                responseData.textContent = JSON.stringify(data, null, 2);
                
                // Telegram haptics
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }

            } catch (error) {
                updateStatus('error', "Xato: " + error.message);
                retryBtn.style.display = 'block';
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            
            // Set header color
            tg.setHeaderColor('#020617');
            
            if (tg.initData) {
                performLogin(tg.initData);
            } else {
                updateStatus('error', "Telegram WebApp muhiti topilmadi");
                // For development testing
                // performLogin("test_data");
            }
        };
    </script>
</body>
</html>

# Birinchi marta: Let's Encrypt webroot (certbot) uchun faqat HTTP.
# To‘liq SSL: deploy.sh sertifikat topgach nginx.conf ishlatadi.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
    }

    location / {
        root /var/www/frontend_bot;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /drivers/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/drivers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /orders/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://__LOGISTIKA_BACKEND__/health;
    }
}

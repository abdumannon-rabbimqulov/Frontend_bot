# Birinchi marta: Let's Encrypt webroot (certbot) uchun faqat HTTP.
# To‘liq SSL: deploy.sh sertifikat topgach nginx.conf ishlatadi.
# /api ishlatilmaydi.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
    }

    location ^~ /auth/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /system/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/system/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /orders/ {
        proxy_pass http://__LOGISTIKA_BACKEND__/orders/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /ai/ {

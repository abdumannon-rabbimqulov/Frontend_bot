<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logistika - Sender</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
      }
      .card {
        width: min(520px, 92vw);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        padding: 24px;
      }
      .title {
        margin: 0;
        font-size: 32px;
        font-weight: 800;
      }
      .muted {
        margin-top: 8px;
        color: #94a3b8;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }
      button, a {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        color: #e2e8f0;
        background: transparent;
        text-decoration: none;
        cursor: pointer;
      }
      .primary {
        background: #38bdf8;
        border-color: #38bdf8;
        color: #001018;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="title">Sender sahifasi</h1>
      <p class="muted">
        Login javobida <code>role=sender</code> bo'lsa foydalanuvchi shu sahifaga yo'naltiriladi.
      </p>
      <div class="actions">
        <a class="primary" href="/">Bosh sahifaga qaytish</a>
        <button id="logoutBtn" type="button">Sessionni tozalash</button>
      </div>
    </div>
    <script>
      const logoutBtn = document.getElementById('logoutBtn');
      logoutBtn?.addEventListener('click', async () => {
        localStorage.removeItem('admin_access_token');
        localStorage.removeItem('admin_refresh_token');
        localStorage.removeItem('admin_user');
        localStorage.removeItem('driver_access_token');
        localStorage.removeItem('driver_refresh_token');
        localStorage.removeItem('driver_user');
        localStorage.removeItem('driver_profile_completed');
        localStorage.setItem('logistika_logged_out', '1');
        window.location.replace('/');
      });
    </script>
  </body>
</html>

# logistic.org.uz — bir hostda Telegram Web App (statik) + Logistika FastAPI (:8003).
# /etc/nginx/conf.d/logistic.org.uz.conf sifatida 158.xx serverda ishlaydi.

server {
    server_name logistic.org.uz www.logistic.org.uz;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/logistic.org.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logistic.org.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
        allow all;
    }

    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:8003/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /orders/ {
        proxy_pass http://127.0.0.1:8003/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /ai/ {
        proxy_pass http://127.0.0.1:8003/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8003/health;
        proxy_set_header Host $host;
    }

    # Frontend API prefix. SPA routes stay separate; API calls use /api/*.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Admin SPA runs inside the frontend Docker container.
    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy "/drivers/*" yo'llarini butunlay yopamiz.
    location = /drivers/login {
        return 302 /login;
    }

    location = /drivers/login/ {
        return 302 /login;
    }

    location ^~ /drivers/ {
        return 302 /login;
    }

    # Yangi frontend route: /driver/*
    location ^~ /driver/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /static/uploads {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /docs {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /redoc {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8003/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name logistic.org.uz www.logistic.org.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

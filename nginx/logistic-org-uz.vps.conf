# logistic.org.uz — bir hostda Telegram Web App (statik) + Logistika FastAPI (:8003).
# /etc/nginx/conf.d/logistic.org.uz.conf sifatida 158.xx serverda ishlaydi.

server {
    server_name logistic.org.uz www.logistic.org.uz;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/logistic.org.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logistic.org.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/frontend_bot;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
        allow all;
    }

    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:8003/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /drivers/ {
        proxy_pass http://127.0.0.1:8003/drivers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /orders/ {
        proxy_pass http://127.0.0.1:8003/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /ai/ {
        proxy_pass http://127.0.0.1:8003/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8003/health;
        proxy_set_header Host $host;
    }

    # Frontend API prefix. Admin SPA routes stay under /admin/*, API calls use /api/*.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Admin SPA — faqat build natijasi: /var/www/frontend_bot/admin
    location ^~ /admin/ {
        alias /var/www/frontend_bot/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Driver SPA
    location ^~ /driver/ {
        alias /var/www/frontend_bot/driver/dist/;
        try_files $uri $uri/ /driver/index.html;
    }

    location ^~ /static/uploads {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /docs {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /redoc {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8003/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name logistic.org.uz www.logistic.org.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/frontend_bot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
